databaseChangeLog:
  - changeSet:
      id: 06-create-projects-users-table
      author: Rostyslav
      changes:
        - createTable:
            tableName: projects_users
            columns:
              - column:
                  name: projects_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: users_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: projects_users
            columnNames: projects_id, users_id
        - addForeignKeyConstraint:
            baseTableName: projects_users
            baseColumnNames: projects_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_projects_users_projects_id
        - addForeignKeyConstraint:
            baseTableName: projects_users
            baseColumnNames: users_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_projects_users_users_id
